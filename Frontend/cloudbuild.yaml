# cloudbuild.yaml — CI/CD automático para Tempos en Google Cloud
# Trigger: push a la rama 'main' despliega en Firebase Hosting (produccion)
# Trigger: push a 'develop' despliega en canal de preview (staging)
#
# Requisitos previos (una sola vez):
#   1. gcloud projects create tempos-app --name="Tempos"
#   2. Habilitar APIs: firebase.googleapis.com, cloudbuild.googleapis.com
#   3. Crear trigger en Cloud Build apuntando a este archivo
#   4. Dar permisos al service account de Cloud Build:
#      roles/firebase.admin  +  roles/iam.serviceAccountTokenCreator

steps:
  # 1. Instalar dependencias de Node
  - name: 'node:20-alpine'
    id: install
    entrypoint: npm
    args: ['ci', '--prefer-offline']
    dir: 'Frontend'

  # 2. Build de produccion (Vite)
  - name: 'node:20-alpine'
    id: build
    entrypoint: npm
    args: ['run', 'build']
    dir: 'Frontend'
    env:
      - 'NODE_ENV=production'
      - 'VITE_API_URL=$_VITE_API_URL'
      - 'VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID'
      - 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - 'VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
    waitFor: ['install']

  # 3. Deploy a Firebase Hosting (produccion — rama main)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy-prod
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project $_FIREBASE_PROJECT_ID --token $$FIREBASE_TOKEN
    dir: 'Frontend'
    secretEnv: ['FIREBASE_TOKEN']
    waitFor: ['build']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: 'FIREBASE_TOKEN'

substitutions:
  _FIREBASE_PROJECT_ID: 'tempos-app'
  _VITE_API_URL: 'https://api.tempos.es'
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: 'tempos-app.firebaseapp.com'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

timeout: '600s'
